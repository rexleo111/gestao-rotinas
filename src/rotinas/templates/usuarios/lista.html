{% extends "base.html" %}
{% block title %}Usuários{% endblock %}
{% block content %}
<h1>Usuários</h1>
{% if usuarios %}
<ul>
    {% for u in usuarios %}
    <li>#{{ u.id }} — {{ u.nome }} ({{ u.email }})</li>
    {% endfor %}
</ul>
{% else %}
<p>Nenhum usuário cadastrado.</p>
{% endif %}
{% endblock %}
