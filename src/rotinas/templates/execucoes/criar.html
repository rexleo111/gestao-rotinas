{% extends "base.html" %}
{% block title %}Nova Execução{% endblock %}
{% block content %}
<h1>Registrar Execução</h1>

{% if erro %}
<p style="color: red;"><strong>{{ erro }}</strong></p>
{% endif %}

<form method="post">
    <p>
        Rotina:<br>
        <select name="rotina_id" required>
            {% for r in rotinas %}
            <option value="{{ r.id }}">{{ r.titulo }} ({{ "Ativa" if r.ativa else "Inativa" }})</option>
            {% endfor %}
        </select>
    </p>
    <p>
        Observação:<br>
        <textarea name="observacao"></textarea>
    </p>
    <button type="submit">Registrar</button>
</form>
{% endblock %}
