{% extends "base.html" %}
{% block title %}Nova Rotina{% endblock %}
{% block content %}
<h1>Criar Rotina</h1>
<form method="post">
    <p>
        Título:<br>
        <input type="text" name="titulo" required>
    </p>
    <p>
        Descrição:<br>
        <textarea name="descricao"></textarea>
    </p>
    <p>
        Usuário:<br>
        <select name="usuario_id" required>
            {% for u in usuarios %}
            <option value="{{ u.id }}">{{ u.nome }}</option>
            {% endfor %}
        </select>
    </p>
    <button type="submit">Salvar</button>
</form>
{% endblock %}
